<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>CarPost — Sistema de Marketing Automotivo com IA</title>
    <meta name="title" content="CarPost — Sistema de Marketing Automotivo com IA" />

    <meta name="theme-color" content="#5b21b6" />
